name: Daily News Agent

on:
  schedule:
    - cron: "0 7 * * *"   # запуск щодня о 07:00 за UTC
  workflow_dispatch:       # дозволяє запускати вручну

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install gnews requests

    - name: Run agent
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python main.py
